name: CI

on:
  pull_request:
    branches: [dev, master, main]
  push:
    branches: [dev, master, main]
  workflow_dispatch:

# One run per ref; new pushes cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Detect package manager
    runs-on: ubuntu-latest
    outputs:
      pm: ${{ steps.detect.outputs.pm }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: detect
        name: Detect lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then pm=pnpm;
          elif [ -f yarn.lock ]; then pm=yarn;
          else pm=npm; fi
          echo "pm=$pm" >> "$GITHUB_OUTPUT"
          echo "Package manager: $pm"

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    env:
      PM: ${{ needs.setup.outputs.pm }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - if: env.PM == 'pnpm'
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ env.PM }}
      - name: Install
        run: |
          case "$PM" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm)  npm ci ;;
          esac
      - name: Lint
        run: |
          # This repo's lint script is bare `eslint`, but eslint is not a
          # dependency. Only run lint when eslint actually resolves, so a real
          # lint failure still reds the gate while a missing-tooling setup gap
          # does not. Adding eslint to devDependencies activates this path.
          if node -e "require.resolve('eslint')" 2>/dev/null; then
            if node -e "process.exit(require('./package.json').scripts?.lint?0:1)"; then
              $PM run lint
            else
              npx --no-install eslint .
            fi
          else
            echo "eslint not installed; skipping lint (gate stays green). Add eslint + a config to enable."
          fi

  typecheck:
    name: Type check
    needs: setup
    runs-on: ubuntu-latest
    env:
      PM: ${{ needs.setup.outputs.pm }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - if: env.PM == 'pnpm'
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ env.PM }}
      - name: Install
        run: |
          case "$PM" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm)  npm ci ;;
          esac
      - name: tsc --noEmit
        run: |
          if [ -f tsconfig.json ]; then
            npx --no-install tsc --noEmit || npx tsc --noEmit
          else
            echo "No tsconfig.json; skipping type check."
          fi

  test:
    name: Test (node ${{ matrix.node }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    env:
      PM: ${{ needs.setup.outputs.pm }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - if: env.PM == 'pnpm'
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: ${{ env.PM }}
      - name: Install
        run: |
          case "$PM" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm)  npm ci ;;
          esac
      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test?0:1)"; then
            $PM test
          else
            echo "No test script; skipping tests (gate stays green)."
          fi

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    env:
      PM: ${{ needs.setup.outputs.pm }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - if: env.PM == 'pnpm'
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ env.PM }}
      - name: Install
        run: |
          case "$PM" in
            pnpm) pnpm install --frozen-lockfile ;;
            yarn) yarn install --frozen-lockfile ;;
            npm)  npm ci ;;
          esac
      - name: Build
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build?0:1)"; then
            $PM run build
          else
            echo "No build script; skipping build (gate stays green)."
          fi

  ci-passed:
    name: CI passed
    if: always()
    needs: [setup, lint, typecheck, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Require every job to pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A required CI job did not succeed."
          echo "Results: ${{ join(needs.*.result, ' ') }}"
          exit 1
      - name: All gates green
        run: echo "All CI jobs passed."
