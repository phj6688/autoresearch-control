# Flow 05: Analytics view — tab loads and renders content or error boundary
# Apple HIG: graceful error handling with clear messaging and retry affordance
url: http://localhost:3200/proxy/autoresearch
---
- launchApp

# Navigate to Analytics
- tapOn: "Analytics"

# ── View renders (healthy cards or error boundary with retry) ──
- extendedWaitUntil:
    visible:
      text: ".*ANALYTICS.*|.*HEALTHY.*"
    timeout: 5000

# Verify retry affordance exists if in error state
- assertVisible: "RETRY"

# Navigate back to Sessions
- tapOn: "Sessions"
- assertVisible: "docboost-f1"
