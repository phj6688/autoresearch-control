# Flow 03: Session detail — click a session card, verify detail view loads
# Apple HIG: clear information hierarchy, immediate feedback, action affordances
url: http://localhost:3200/proxy/autoresearch
---
- launchApp
- assertVisible: "docboost-f1"

# Click the session card in sidebar (target the card area, not GPU bar)
- tapOn:
    point: 18%, 40%

# ── Detail view loads with session identity ──
- extendedWaitUntil:
    visible:
      text: ".*Pause.*|.*Kill.*|.*Experiment Timeline.*"
    timeout: 5000

# ── Action buttons for a running session ──
- assertVisible: "Pause"
- assertVisible: "Kill"

# ── Metrics row ──
- assertVisible: "EXPERIMENTS"
- assertVisible: "COMMITTED"
- assertVisible: "HIT RATE"

# ── Section headers ──
- assertVisible: "Experiment Timeline"
- assertVisible: "Session Events"

# Detail view fully loaded with all expected sections
