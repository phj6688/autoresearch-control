name: autoresearch-control

services:
  mission-control:
    build: .
    container_name: autoresearch-control
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3200
      AUTORESEARCH_REPO_PATH: /repo
      AUTORESEARCH_WORKTREE_DIR: /worktrees
      INFISICAL_DOMAIN: http://infisical:8080
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: prod
    secrets:
      - infisical_client_id
      - infisical_client_secret
    ports:
    - 3200:3200
    networks:
    - platform-net
    restart: unless-stopped
    volumes:
    # State lives under ~/data since the 2026-07 reorg (was ./data in the
    # source tree; the docboost import bind is gone with the lumo account).
    - /home/peyman/data/autoresearch-control/data:/app/data
    - ${AUTORESEARCH_REPO_PATH:-/home/peyman/data/autoresearch-control/repo}:/repo
    - ${AUTORESEARCH_WORKTREE_DIR:-/home/peyman/data/autoresearch-control/worktrees}:/worktrees
    - /sys/class/drm:/sys/class/drm:ro
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    # Deployment-owned copy (bin/ is gitignored): version-dir mounts break
    # when the claude auto-updater prunes old versions, which is exactly how
    # the previous 2.1.77 mount died. Refresh by re-copying a newer binary.
    - ./bin/claude:/usr/local/bin/claude:ro
    - /home/peyman/.claude:/home/agent/.claude
    - /home/peyman/.claude.json:/home/agent/.claude.json
    devices:
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    group_add:
    - video
    - render
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3200/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  platform-net:
    external: true

secrets:
  infisical_client_id:
    file: ./secrets/infisical_client_id
  infisical_client_secret:
    file: ./secrets/infisical_client_secret
