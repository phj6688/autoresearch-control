services:
  mission-control:
    build: .
    container_name: autoresearch-control
    environment:
    - PORT=3200
    - AUTORESEARCH_REPO_PATH=/repo
    - AUTORESEARCH_WORKTREE_DIR=/worktrees
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    - DEFAULT_AGENT=${DEFAULT_AGENT:-claude-code}
    - DEFAULT_AGENT_COMMAND=${DEFAULT_AGENT_COMMAND:-claude --model claude-opus-4-6}
    network_mode: host
    ports:
    - 3200:3200
    restart: unless-stopped
    volumes:
    - ./data:/app/data
    - ${AUTORESEARCH_REPO_PATH:-./repo}:/repo
    - ${AUTORESEARCH_WORKTREE_DIR:-./worktrees}:/worktrees
    - /sys/class/drm:/sys/class/drm:ro
