services:
  mission-control:
    build: .
    container_name: autoresearch-control
    environment:
    - HOSTNAME=0.0.0.0
    - PORT=3200
    - AUTORESEARCH_REPO_PATH=/repo
    - AUTORESEARCH_WORKTREE_DIR=/worktrees
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    - DEFAULT_AGENT=${DEFAULT_AGENT:-claude-code}
    - DEFAULT_AGENT_COMMAND=${DEFAULT_AGENT_COMMAND:-claude --model claude-opus-4-6}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - ASSISTANT_MODEL=${ASSISTANT_MODEL:-claude-haiku-4-5-20251001}
    ports:
    - 3200:3200
    networks:
    - deploy_iris-net
    restart: unless-stopped
    volumes:
    - ./data:/app/data
    - ${AUTORESEARCH_REPO_PATH:-./repo}:/repo
    - ${AUTORESEARCH_WORKTREE_DIR:-./worktrees}:/worktrees
    - /home/lumo/docboost:/docboost
    - /sys/class/drm:/sys/class/drm:ro
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    - /home/peyman/.local/bin/claude:/usr/local/bin/claude:ro
    - /home/peyman/.claude:/home/agent/.claude
    - /home/peyman/.claude.json:/home/agent/.claude.json
    devices:
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    group_add:
    - video
    - render

networks:
  deploy_iris-net:
    external: true
