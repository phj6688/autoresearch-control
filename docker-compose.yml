services:
  mission-control:
    build: .
    container_name: autoresearch-control
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3200
      AUTORESEARCH_REPO_PATH: /repo
      AUTORESEARCH_WORKTREE_DIR: /worktrees
      INFISICAL_DOMAIN: http://infisical:8080
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: prod
    secrets:
      - infisical_client_id
      - infisical_client_secret
    ports:
    - 3200:3200
    networks:
    - platform-net
    restart: unless-stopped
    volumes:
    - ./data:/app/data
    - ${AUTORESEARCH_REPO_PATH:-./repo}:/repo
    - ${AUTORESEARCH_WORKTREE_DIR:-./worktrees}:/worktrees
    - /home/lumo/docboost:/docboost
    - /sys/class/drm:/sys/class/drm:ro
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    - /home/peyman/.local/share/claude/versions/2.1.77:/usr/local/bin/claude:ro
    - /home/peyman/.claude:/home/agent/.claude
    - /home/peyman/.claude.json:/home/agent/.claude.json
    devices:
    - /dev/dri:/dev/dri
    - /dev/kfd:/dev/kfd
    group_add:
    - video
    - render

networks:
  platform-net:
    external: true

secrets:
  infisical_client_id:
    file: ./secrets/infisical_client_id
  infisical_client_secret:
    file: ./secrets/infisical_client_secret
